<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxuryClothes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col font-[Montserrat]">
    <div id="navbar"></div>
    <div id="main" class="flex-1">
        <!-- Breadcrumb (puedes dejarlo o quitarlo) -->
        <div class="bg-white border-b px-4 py-3 md:px-6 flex flex-col md:flex-row md:items-center md:justify-between text-sm text-gray-600">
            <div>
                <span class="text-gray-400">Calzado /</span> General
            </div>
            <div class="mt-2 md:mt-0">
                <span class="text-gray-400">Tipo /</span> Género / Subtipo
            </div>
        </div>
    
        <div class="flex max-w-[1400px] mx-auto">
            <!-- Sidebar filtros (puedes dejarlo vacío o copiar el de ropa.html) -->
            <aside class="hidden md:block w-72 lg:w-80 shrink-0 bg-white border-r p-5 lg:p-6 sticky top-[80px] h-[calc(100vh-80px)] overflow-y-auto">

                <!-- Género -->
                <div class="mb-7">
                    <h3 class="font-semibold text-base mb-3 pb-2 border-b">Género</h3>
                    <div class="space-y-2.5 text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Mujer</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Hombre</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Niños</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Unisex</span>
                        </label>
                    </div>
                </div>
            
                <!-- Color -->
                <div class="mb-7">
                    <h3 class="font-semibold text-base mb-3 pb-2 border-b">Color</h3>
                    <div class="flex flex-wrap gap-2.5 mt-2">
                        <button class="w-7 h-7 rounded-full bg-black ring-1 ring-gray-300"></button>
                        <button class="w-7 h-7 rounded-full bg-white ring-1 ring-gray-300"></button>
                        <button class="w-7 h-7 rounded-full bg-red-600 ring-1 ring-gray-300"></button>
                        <button class="w-7 h-7 rounded-full bg-blue-600 ring-1 ring-gray-300"></button>
                        <button class="w-7 h-7 rounded-full bg-yellow-400 ring-1 ring-gray-300"></button>
                        <button class="w-7 h-7 rounded-full bg-green-600 ring-1 ring-gray-300"></button>
                        <button class="w-7 h-7 rounded-full bg-gray-500 ring-1 ring-gray-300"></button>
                    </div>
                </div>
            
                <!-- Tipo de Calzado (adaptado) -->
                <div class="mb-7">
                    <h3 class="font-semibold text-base mb-3 pb-2 border-b">Calzado</h3>
                    <div class="space-y-2.5 text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Tenis</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Botas</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Sandalias</span>
                        </label>
                    </div>
                </div>
            
                <!-- Marca -->
                <div class="mb-4">
                    <h3 class="font-semibold text-base mb-3 pb-2 border-b">Marca</h3>
                    <div class="space-y-2.5 text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Nike</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Adidas</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-black accent-black">
                            <span>Puma</span>
                        </label>
                    </div>
                </div>
            
            </aside>
    
            <!-- Grid de productos -->
            <main class="flex-1 p-4 md:p-6 lg:p-8">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6 lg:gap-7" id="productos-grid">
                    <!-- Aquí el filtro va a poner las tarjetas automáticamente -->
                </div>
            </main>
        </div>
    </div>
    <div id="footer"></div>
    <script src="./scripts/main.js"></script>
    <script src="./scripts/script.js"></script>
    <script>
        // FILTRO ULTRA ROBUSTO - versión final
        async function filtrarProductosDesdeNavbar() {
          const sub = new URLSearchParams(window.location.search).get('sub');
          if (!sub || !window.location.pathname.includes('calzado.html')) return;
        
          console.log("🔍 Buscando productos para:", sub);
        
          try {
            const res = await fetch('./JSON/productos.json');
            const data = await res.json();
            const productos = data.productos || data.data || [];
        
            // Filtro mejorado (funciona con "Sandalias", "sandalias", "SANDALIAS")
            const filtered = productos.filter(p => 
              (p.nombre || "").toLowerCase().includes(sub.toLowerCase())
            );
        
            console.log(`✅ Encontrados ${filtered.length} productos`);
        
            let grid = document.getElementById('productos-grid');
        
            // Si por alguna razón no existe el grid, lo crea automáticamente
            if (!grid) {
              const mainContainer = document.querySelector('#main');
              grid = document.createElement('div');
              grid.id = 'productos-grid';
              grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6 lg:gap-7 p-8';
              mainContainer.appendChild(grid);
            }
        
            if (filtered.length === 0) {
              grid.innerHTML = `<p class="col-span-full text-center py-20 text-xl">No hay productos para "${sub}"</p>`;
              return;
            }
        
            grid.innerHTML = filtered.map(p => `
              <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 group">
                <div class="relative aspect-[3/4] bg-gray-100">
                  <img src="${p.imagen_url}" alt="${p.nombre}" class="w-full h-full object-cover group-hover:scale-105 transition">
                </div>
                <div class="p-4">
                  <h3 class="text-sm font-medium text-gray-900 line-clamp-2">${p.nombre}</h3>
                  <p class="mt-2 text-lg font-bold">$${parseFloat(p.precio).toLocaleString('es-MX')}</p>
                </div>
              </div>
            `).join('');
        
          } catch (e) {
            console.error("❌ Error:", e);
          }
        }
        
        window.addEventListener('load', filtrarProductosDesdeNavbar);
        </script>
</body>
</html>
